name: deploy-server-config

on:
  push:
    branches: [main]
    paths:
      - "server/**"
  workflow_dispatch:

concurrency:
  group: deploy-server-config
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${VPS_HOST}"
          test -n "${VPS_USER}"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload nginx config candidate
        run: |
          set -euo pipefail
          scp -P "${VPS_PORT:-22}" server/tunnel.starton.jp.conf \
            "${VPS_USER}@${VPS_HOST}:/tmp/tunnel.starton.jp.conf.new"

      - name: Install config and reload nginx (with rollback on failure)
        run: |
          set -euo pipefail
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" <<'EOF'
          set -euo pipefail
          TARGET="/etc/nginx/sites-available/tunnel.starton.jp.conf"
          CANDIDATE="/tmp/tunnel.starton.jp.conf.new"
          BACKUP="/tmp/tunnel.starton.jp.conf.bak.$(date +%Y%m%d%H%M%S)"

          if [ -f "${TARGET}" ]; then
            sudo cp "${TARGET}" "${BACKUP}"
          fi

          sudo install -m 644 "${CANDIDATE}" "${TARGET}"

          if sudo nginx -t; then
            sudo systemctl reload nginx
            rm -f "${CANDIDATE}"
            echo "deploy success"
          else
            echo "nginx -t failed. rolling back..."
            if [ -f "${BACKUP}" ]; then
              sudo install -m 644 "${BACKUP}" "${TARGET}"
            fi
            sudo nginx -t
            exit 1
          fi
          EOF
